name: CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-test:
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache ONNX model files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Check code formatting
        run: ./gradlew spotlessCheck
        working-directory: ./backend

      - name: Run unit and integration tests
        run: ./gradlew test jacocoTestReport
        working-directory: ./backend

      - name: Publish test results
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
        if: success() || failure()
        with:
          report_paths: backend/build/test-results/test/TEST-*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: Unit & Integration Tests

      - name: Report coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848 # v1.7.2
        with:
          paths: ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Code Coverage
          update-comment: true

  backend-e2etest:
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache ONNX model files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Run E2E tests
        env:
          DEV_TYLERCASH_DISCORD_GUILD_ID: ${{ secrets.DEV_TYLERCASH_DISCORD_GUILD_ID }}
          DEV_TYLERCASH_DISCORD_TOKEN: ${{ secrets.DEV_TYLERCASH_DISCORD_TOKEN }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET }}
        run: ./gradlew e2eTest
        working-directory: ./backend

      - name: Publish E2E test results
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
        if: success() || failure()
        with:
          report_paths: backend/build/test-results/e2eTest/TEST-*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: E2E Tests

  backend-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache ONNX model files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        env:
          DEV_TYLERCASH_DISCORD_GUILD_ID: ${{ secrets.DEV_TYLERCASH_DISCORD_GUILD_ID }}
          DEV_TYLERCASH_DISCORD_TOKEN: ${{ secrets.DEV_TYLERCASH_DISCORD_TOKEN }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET }}
        run: ./gradlew bootBuildImage -Pspring.boot.build-image.imageName="ghcr.io/${{ env.OWNER_LOWERCASE }}/peep-bot-backend:latest" -x test
        working-directory: ./backend

      - name: Push SHA-tagged image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          SHA_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:sha-${{ github.sha }}"
          docker tag "ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:latest" "$SHA_REF"
          docker push "$SHA_REF"

  backend-sbom:
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Generate SBOM
        run: ./gradlew cyclonedxBom
        working-directory: ./backend

      - name: Scan SBOM with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: backend/build/reports/application.cdx.json
          output-file: backend/grype-backend.sarif
          severity-cutoff: critical
          fail-build: true

      - name: Print Grype results
        if: always()
        run: |
          cat backend/grype-backend.sarif | jq '.runs[].results[] | {ruleId, message: .message.text}'

      - name: Manually correct SARIF paths
        if: always()
        run: |
          echo "Correcting paths in SARIF file..."
          SARIF_FILE="backend/grype-backend.sarif"
          TMP_SARIF_FILE="${SARIF_FILE}.tmp"
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation.uri |= "backend/" + .)' "$SARIF_FILE" > "$TMP_SARIF_FILE"
          mv "$TMP_SARIF_FILE" "$SARIF_FILE"
          echo "Path correction complete."

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always()
        with:
          sarif_file: backend/grype-backend.sarif
          category: backend

  backend-push:
    needs: [backend-test, backend-e2etest, backend-build, backend-sbom]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as :latest in registry
        run: |
          SHA_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:sha-${{ github.sha }}"
          LATEST_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:latest"
          docker buildx imagetools create --tag "$LATEST_REF" "$SHA_REF"

  frontend-ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: ./frontend

      - name: Test
        run: npm run test
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          # Build on CI against the mock backend so lack of homelab access
          # can't break the build. Production env vars live in Vercel.
          NEXT_PUBLIC_API_MODE: mock

  frontend-e2e:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_MODE: mock
      CI: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Run Playwright smoke suite
        run: npm run test:e2e
        working-directory: ./frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  deploy-staging-backend:
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      image_ref: ${{ steps.pull.outputs.image_ref }}
    steps:
      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new backend image and get digest
        id: pull
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          IMAGE="ghcr.io/${{ env.OWNER_LOWERCASE }}/peep-bot-backend:${VERSION}"
          docker pull "${IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" | cut -d@ -f2)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "image_ref=${VERSION}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Checkout portainer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Tyler-Cash/portainer
          token: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

      - name: Update peepbot-staging backend image
        id: update-image
        run: |
          sed -i "s|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:.*|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:${VERSION}@${DIGEST}|" stacks/peepbot-staging/docker-compose.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add stacks/peepbot-staging/docker-compose.yml
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(peepbot-staging): update backend to ${VERSION}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for portainer deploy to complete
        if: steps.update-image.outputs.committed == 'true'
        timeout-minutes: 30
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for portainer deploy workflow for commit ${COMMIT_SHA}..."
          for i in $(seq 1 18); do
            RUN_ID=$(gh run list --repo Tyler-Cash/portainer --workflow=deploy.yml --limit=10 --json databaseId,headSha --jq ".[] | select(.headSha == \"${COMMIT_SHA}\") | .databaseId" | head -1)
            if [ -n "${RUN_ID}" ]; then
              echo "Found run ${RUN_ID}, waiting for it to complete..."
              gh run watch "${RUN_ID}" --repo Tyler-Cash/portainer --exit-status
              exit $?
            fi
            echo "Run not found yet (attempt ${i}/18), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for portainer deploy workflow to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

  deploy-staging-frontend:
    needs: [release, deploy-staging-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview settings)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build with Vercel (preview build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy preview to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "deployment_url=$url" >> $GITHUB_OUTPUT
          echo "Staging deployment: $url"

      - name: Alias staging deployment to event-staging.tylercash.dev
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" event-staging.tylercash.dev --token=$VERCEL_TOKEN
          echo "Staging now serving from: https://event-staging.tylercash.dev"

  deploy-prod-backend:
    needs: [release, deploy-staging-backend, deploy-staging-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
    steps:
      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Resolve image ref from staging
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          IMAGE_REF="${{ needs.deploy-staging-backend.outputs.image_ref }}"
          DIGEST="${IMAGE_REF#*@}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "Promoting backend ${VERSION}@${DIGEST} (same digest as staging)"

      - name: Checkout portainer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Tyler-Cash/portainer
          token: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

      - name: Update peepbot prod backend image
        id: update-image
        run: |
          sed -i "s|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:.*|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:${VERSION}@${DIGEST}|" stacks/peepbot/docker-compose.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add stacks/peepbot/docker-compose.yml
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(peepbot): promote backend to ${VERSION}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for portainer deploy to complete
        if: steps.update-image.outputs.committed == 'true'
        timeout-minutes: 30
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for portainer deploy workflow for commit ${COMMIT_SHA}..."
          for i in $(seq 1 18); do
            RUN_ID=$(gh run list --repo Tyler-Cash/portainer --workflow=deploy.yml --limit=10 --json databaseId,headSha --jq ".[] | select(.headSha == \"${COMMIT_SHA}\") | .databaseId" | head -1)
            if [ -n "${RUN_ID}" ]; then
              echo "Found run ${RUN_ID}, waiting for it to complete..."
              gh run watch "${RUN_ID}" --repo Tyler-Cash/portainer --exit-status
              exit $?
            fi
            echo "Run not found yet (attempt ${i}/18), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for portainer deploy workflow to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

  deploy-prod-frontend:
    needs: [deploy-prod-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build with Vercel (production build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Production deployment: $url"
          echo "Now serving from: https://event.tylercash.dev"

  frontend-sbom:
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Generate SBOM
        id: sbom
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          path: ./frontend
          format: cyclonedx-json
          output-file: frontend/sbom-frontend.cdx.json

      - name: Scan SBOM with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: frontend/sbom-frontend.cdx.json
          output-file: frontend/grype-frontend.sarif
          source-root: ./frontend
          severity-cutoff: critical
          fail-build: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always()
        with:
          sarif_file: frontend/grype-frontend.sarif
          category: frontend

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-push, frontend-ci, frontend-sbom]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    outputs:
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest backend image
        run: docker pull "ghcr.io/${{ env.OWNER_LOWERCASE }}/peep-bot-backend:latest"

      - name: Semantic Release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
