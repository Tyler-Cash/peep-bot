name: CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            mcp:
              - 'mcp/**'

  mcp-test:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install
        working-directory: mcp
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: mcp
        run: npm run build

      - name: Test
        working-directory: mcp
        run: npm test

  backend-test:
    # Sharded on main pushes (4 shards) to minimise time-to-prod; single
    # un-sharded run on PRs so the PR's coverage report covers the full suite
    # and the test-result check-run UI stays clean. The fromJson()s let the
    # matrix size flex at workflow-resolve time.
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(github.event_name == 'push' && '[0, 1, 2, 3]' || '[0]') }}
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache ONNX model files
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      # jacoco + PR coverage comment + openapi diff check only on shard 0:
      # shard 0 always owns OpenApiSpecGenerationTest (pinned in build.gradle), so
      # it's the only shard where the openapi.json on disk reflects a fresh run.
      # Spotless moved to backend-build (it's build hygiene, not test concern).
      # Run test + jacocoTestReport in ONE Gradle invocation on shard 0 so
      # jacoco aggregates the .exec from the sharded run. Calling
      # jacocoTestReport in a separate `./gradlew` would re-execute the test
      # task without the shard property and run every class again. Shard count
      # is 4 on main pushes, 1 on PRs (matches matrix size above); when
      # SHARD_COUNT=1 the Gradle filter is a no-op and the full suite runs.
      - name: Run sharded backend tests
        env:
          SHARD_COUNT: ${{ github.event_name == 'push' && '4' || '1' }}
        run: |
          if [ "${{ matrix.shard }}" = "0" ]; then
            ./gradlew test jacocoTestReport -Pshard.index=0 -Pshard.count=$SHARD_COUNT
          else
            ./gradlew test -Pshard.index=${{ matrix.shard }} -Pshard.count=$SHARD_COUNT
          fi
        working-directory: ./backend

      - name: Verify openapi.json is up to date
        if: matrix.shard == 0
        run: |
          if ! git diff --exit-code openapi.json; then
            echo "::error::backend/openapi.json is out of date. Run './gradlew generateOpenApiDocs' locally and commit the result."
            exit 1
          fi
        working-directory: ./backend

      - name: Publish test results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        if: success() || failure()
        with:
          report_paths: backend/build/test-results/test/TEST-*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: Unit & Integration Tests (shard ${{ matrix.shard }})

      - name: Report coverage on PR
        if: matrix.shard == 0 && github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Code Coverage (shard 0)
          update-comment: true

  backend-e2etest:
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache ONNX model files
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Run E2E tests
        env:
          DEV_TYLERCASH_DISCORD_GUILD_ID: ${{ secrets.DEV_TYLERCASH_DISCORD_GUILD_ID }}
          DEV_TYLERCASH_DISCORD_TOKEN: ${{ secrets.DEV_TYLERCASH_DISCORD_TOKEN }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET }}
        run: ./gradlew e2eTest
        working-directory: ./backend

      - name: Publish E2E test results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        if: success() || failure()
        with:
          report_paths: backend/build/test-results/e2eTest/TEST-*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: E2E Tests

  backend-build:
    runs-on: ubuntu-24.04
    # contents: write is required even in dry-run mode — semantic-release's
    # verifyConditions step probes `git push --dry-run` against the remote and
    # the GitHub-Actions bot needs push permission for the probe to pass. No
    # actual writes happen because we pass dry_run: true to the action.
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so semantic-release can analyse commits and `git describe`
          # can find the most recent tag — needed for the version-resolve step.
          fetch-depth: 0

      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache ONNX model files
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: backend/src/main/resources/models
          key: onnx-model-all-minilm-l6-v2

      # The GHA cache for the Paketo builder was actively slower than pulling
      # fresh: 26s to restore the ~500MB tar from cache + 88s for `docker load`
      # is 114s, while a cold pull from Docker Hub is ~49s. Removed; bootBuildImage
      # pulls the builder on demand during the "Build container image" step.

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      # Spotless lives here (not in backend-test) because formatting is build
      # hygiene — failing it should short-circuit before we spend 3 min on
      # Paketo. ~10s on warm Gradle cache.
      - name: Check code formatting
        run: ./gradlew spotlessCheck
        working-directory: ./backend

      # Resolve the version baked into the image. On main pushes we run
      # semantic-release in dry-run mode to predict the next release tag; on PRs
      # (and as a fallback) we use `git describe` so the build still gets a
      # commit-precise identifier rather than "0.0.1-SNAPSHOT". Inlined into
      # backend-build so version computation isn't a separate job.
      - name: Semantic-release dry-run
        id: dry-run
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          # Pipe action output through env to keep the run: block free of `${{ }}`
          # expansion in shell context (workflow-injection-safe pattern).
          DRY_RUN_VERSION: ${{ steps.dry-run.outputs.new_release_version }}
        run: |
          if [ -n "${DRY_RUN_VERSION}" ]; then
            VERSION="${DRY_RUN_VERSION}"
          else
            VERSION=$(git describe --tags --always --dirty | sed 's/^v//')
            VERSION="${VERSION:-0.0.1-SNAPSHOT}"
          fi
          echo "Resolved build version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        env:
          DEV_TYLERCASH_DISCORD_GUILD_ID: ${{ secrets.DEV_TYLERCASH_DISCORD_GUILD_ID }}
          DEV_TYLERCASH_DISCORD_TOKEN: ${{ secrets.DEV_TYLERCASH_DISCORD_TOKEN }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET }}
          # Bakes into build-info.properties → OTel service.version at runtime.
          # See backend/build.gradle for the precedence rules.
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
        run: ./gradlew bootBuildImage -PreleaseVersion="${RELEASE_VERSION}" -Pspring.boot.build-image.imageName="ghcr.io/${{ env.OWNER_LOWERCASE }}/peep-bot-backend:latest" -x test
        working-directory: ./backend

      - name: Push SHA-tagged image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          SHA_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:sha-${{ github.sha }}"
          docker tag "ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:latest" "$SHA_REF"
          docker push "$SHA_REF"

  backend-sbom:
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Generate SBOM
        run: ./gradlew cyclonedxBom
        working-directory: ./backend

      - name: Scan SBOM with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: backend/build/reports/application.cdx.json
          output-file: backend/grype-backend.sarif
          severity-cutoff: critical
          fail-build: true

      - name: Print Grype results
        if: always()
        run: |
          cat backend/grype-backend.sarif | jq '.runs[].results[] | {ruleId, message: .message.text}'

      - name: Manually correct SARIF paths
        if: always()
        run: |
          echo "Correcting paths in SARIF file..."
          SARIF_FILE="backend/grype-backend.sarif"
          TMP_SARIF_FILE="${SARIF_FILE}.tmp"
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation.uri |= "backend/" + .)' "$SARIF_FILE" > "$TMP_SARIF_FILE"
          mv "$TMP_SARIF_FILE" "$SARIF_FILE"
          echo "Path correction complete."

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        with:
          sarif_file: backend/grype-backend.sarif
          category: backend

  frontend-ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: ./frontend

      - name: Test
        run: npm run test
        working-directory: ./frontend

      - name: Verify generated types match openapi.json
        run: npm run codegen:check
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          # Build on CI against the mock backend so lack of homelab access
          # can't break the build. Production env vars live in Vercel.
          NEXT_PUBLIC_API_MODE: mock

  # Split from a single frontend-e2e job: previously did two sequential Next
  # builds (mock + live) and ran two Playwright suites against them, costing
  # ~2:12 wall clock. Running mock and live in parallel halves it; the setup
  # overhead (node, npm ci, playwright install) is paid twice but they pay it
  # concurrently. Both halves use the shared Playwright browser cache.
  frontend-e2e-mock:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_MODE: mock
      CI: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Build frontend (mock mode)
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_MODE: mock

      - name: Run Playwright smoke suite (chromium against prod build)
        run: npm run test:e2e
        working-directory: ./frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-mock
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  frontend-e2e-live:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      CI: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Build frontend (live mode)
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_MODE: live
          NEXT_DIST_DIR: .next-live

      - name: Run Playwright smoke suite (live)
        run: npm run test:e2e:live
        working-directory: ./frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-live
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  deploy-staging-backend:
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      image_ref: ${{ steps.pull.outputs.image_ref }}
    steps:
      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new backend image and get digest
        id: pull
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          IMAGE="ghcr.io/${{ env.OWNER_LOWERCASE }}/peep-bot-backend:${VERSION}"
          docker pull "${IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" | cut -d@ -f2)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "image_ref=${VERSION}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Checkout portainer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Tyler-Cash/portainer
          token: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

      - name: Update peepbot-staging backend image
        id: update-image
        run: |
          sed -i "s|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:.*|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:${VERSION}@${DIGEST}|" stacks/peepbot-staging/docker-compose.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add stacks/peepbot-staging/docker-compose.yml
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(peepbot-staging): update backend to ${VERSION}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for portainer deploy to complete
        if: steps.update-image.outputs.committed == 'true'
        timeout-minutes: 30
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for portainer deploy workflow for commit ${COMMIT_SHA}..."
          for i in $(seq 1 18); do
            RUN_ID=$(gh run list --repo Tyler-Cash/portainer --workflow=deploy.yml --limit=10 --json databaseId,headSha --jq ".[] | select(.headSha == \"${COMMIT_SHA}\") | .databaseId" | head -1)
            if [ -n "${RUN_ID}" ]; then
              echo "Found run ${RUN_ID}, waiting for it to complete..."
              gh run watch "${RUN_ID}" --repo Tyler-Cash/portainer --exit-status
              exit $?
            fi
            echo "Run not found yet (attempt ${i}/18), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for portainer deploy workflow to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

  deploy-staging-frontend:
    # Staging-frontend no longer gates on staging-backend — the two stacks deploy
    # in parallel after release. Vercel's preview deploy is independent of the
    # backend image rolling out in portainer.
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview settings)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build with Vercel (preview build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy preview to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "deployment_url=$url" >> $GITHUB_OUTPUT
          echo "Staging deployment: $url"

      - name: Alias staging deployment to event-staging.tylercash.dev
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" event-staging.tylercash.dev --token=$VERCEL_TOKEN
          echo "Staging now serving from: https://event-staging.tylercash.dev"

  deploy-prod-backend:
    # backend-e2etest is now gated at the `release` job — nothing downstream of
    # release runs unless the real-Discord smoke passed. Backend prod deploy
    # therefore only needs its own staging deploy to finish.
    needs: [release, deploy-staging-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
    steps:
      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Resolve image ref from staging
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          IMAGE_REF="${{ needs.deploy-staging-backend.outputs.image_ref }}"
          DIGEST="${IMAGE_REF#*@}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "Promoting backend ${VERSION}@${DIGEST} (same digest as staging)"

      - name: Checkout portainer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Tyler-Cash/portainer
          token: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

      - name: Update peepbot prod backend image
        id: update-image
        run: |
          sed -i "s|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:.*|image: ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:${VERSION}@${DIGEST}|" stacks/peepbot/docker-compose.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add stacks/peepbot/docker-compose.yml
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(peepbot): promote backend to ${VERSION}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for portainer deploy to complete
        if: steps.update-image.outputs.committed == 'true'
        timeout-minutes: 30
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for portainer deploy workflow for commit ${COMMIT_SHA}..."
          for i in $(seq 1 18); do
            RUN_ID=$(gh run list --repo Tyler-Cash/portainer --workflow=deploy.yml --limit=10 --json databaseId,headSha --jq ".[] | select(.headSha == \"${COMMIT_SHA}\") | .databaseId" | head -1)
            if [ -n "${RUN_ID}" ]; then
              echo "Found run ${RUN_ID}, waiting for it to complete..."
              gh run watch "${RUN_ID}" --repo Tyler-Cash/portainer --exit-status
              exit $?
            fi
            echo "Run not found yet (attempt ${i}/18), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for portainer deploy workflow to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PORTAINER_DEPLOY_TOKEN }}

  deploy-prod-frontend:
    # Frontend prod gates on its own staging, not the backend chain. Backend and
    # frontend deploy in parallel; if a prod release actually breaks the API
    # contract between them, staging would have caught it first.
    needs: [release, deploy-staging-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build with Vercel (production build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Production deployment: $url"
          echo "Now serving from: https://event.tylercash.dev"

  frontend-sbom:
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Generate SBOM
        id: sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./frontend
          format: cyclonedx-json
          output-file: frontend/sbom-frontend.cdx.json

      - name: Scan SBOM with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: frontend/sbom-frontend.cdx.json
          output-file: frontend/grype-frontend.sarif
          source-root: ./frontend
          severity-cutoff: critical
          fail-build: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        with:
          sarif_file: frontend/grype-frontend.sarif
          category: frontend

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # backend-push was folded into this job — the SHA→:latest retag now lives
    # at "Tag SHA image as :latest". backend-e2etest gates here too: if the
    # real-Discord smoke fails, we don't update :latest, don't tag a release,
    # and nothing deploys.
    needs:
      [
        backend-test,
        backend-build,
        backend-sbom,
        backend-e2etest,
        frontend-ci,
        frontend-e2e-mock,
        frontend-e2e-live,
        frontend-sbom,
      ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    outputs:
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up lowercase owner
        run: echo "OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as :latest in registry
        # Pure registry-side retag — no local docker pull/push needed. The
        # semantic-release exec step (tag-and-push-images.sh) likewise uses
        # imagetools to add the :VERSION tag, so the entire release job runs
        # without ever pulling the ~200MB backend image to the runner.
        run: |
          SHA_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:sha-${{ github.sha }}"
          LATEST_REF="ghcr.io/${OWNER_LOWERCASE}/peep-bot-backend:latest"
          docker buildx imagetools create --tag "$LATEST_REF" "$SHA_REF"

      - name: Semantic Release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
