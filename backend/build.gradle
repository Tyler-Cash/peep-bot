plugins {
    id 'application'
    id 'jacoco'
    id 'com.diffplug.spotless' version '8.4.0'
    id 'org.springframework.boot' version '4.0.6'
    id 'org.cyclonedx.bom' version '2.4.1'
    id 'com.google.protobuf' version '0.10.0'
}

apply plugin: 'application'
apply plugin: 'io.spring.dependency-management'

group = 'dev.tylercash'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'dev.tylercash.event.PeepBotApplication'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
    // Spring AI 2.x (Spring Boot 4 / Jackson 3 compatible) is still in milestones.
    maven { url 'https://repo.spring.io/milestone' }
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.ai:spring-ai-bom:2.0.0-M6'
        // Spring Boot 4 manages testcontainers, but the protobuf-gradle-plugin builds
        // its own *ProtoPath configurations that don't inherit Boot's BOM. Importing
        // the testcontainers BOM explicitly applies versions across every config.
        mavenBom 'org.testcontainers:testcontainers-bom:2.0.5'
    }
}

dependencies {
    implementation 'com.bucket4j:bucket4j_jdk17-core:8.18.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'com.google.protobuf:protobuf-java:4.34.1'
    implementation 'com.ibm.icu:icu4j:78.3'
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'org.hibernate.orm:hibernate-community-dialects'
    // Boot 4 moved Liquibase auto-configuration into a dedicated starter; the
    // bare liquibase-core dependency no longer triggers migration on startup.
    implementation 'org.springframework.boot:spring-boot-starter-liquibase'
    implementation 'org.postgresql:postgresql'
    implementation 'org.projectlombok:lombok'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'com.github.ben-manes.caffeine:caffeine'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    // Boot 4 defaults to Jackson 3 (`tools.jackson.*`). The codebase still uses
    // Jackson 2 (`com.fasterxml.jackson.*`); spring-boot-jackson2 re-registers
    // the Jackson 2 ObjectMapper bean and HTTP message converters.
    implementation 'org.springframework.boot:spring-boot-jackson2'
    implementation 'io.github.resilience4j:resilience4j-annotations:2.4.0'
    implementation 'io.github.resilience4j:resilience4j-circuitbreaker:2.4.0'
    implementation 'io.github.resilience4j:resilience4j-ratelimiter:2.4.0'
    implementation 'io.github.resilience4j:resilience4j-retry:2.4.0'
    // Boot 4 split the OAuth2 client autoconfiguration (and OAuth2ClientProperties)
    // into the dedicated spring-boot-starter-oauth2-client module.
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.session:spring-session-jdbc'
    implementation 'net.javacrumbs.shedlock:shedlock-spring:7.7.0'
    implementation 'net.javacrumbs.shedlock:shedlock-provider-jdbc-template:7.7.0'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'
    implementation 'io.micrometer:micrometer-registry-otlp'
    implementation("net.dv8tion:JDA:6.4.1") {
        exclude module: 'opus-java'
    }
    // Spring Boot 4 renamed spring-boot-starter-aop → spring-boot-starter-aspectj
    // and dropped spring-retry from managed dependencies.
    implementation 'org.springframework.boot:spring-boot-starter-aspectj'
    implementation 'org.springframework.retry:spring-retry:2.0.12'
    implementation 'net.logstash.logback:logstash-logback-encoder:9.0'
    implementation 'org.jfree:jfreechart:1.5.6'
    // Boot 4 ships Hibernate 7.2; the matching hypersistence-utils artifact is the -71 variant.
    implementation 'io.hypersistence:hypersistence-utils-hibernate-71:3.15.2'
    implementation 'org.springframework.ai:spring-ai-starter-model-transformers'
    implementation 'org.springframework.ai:spring-ai-starter-model-ollama'

    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    runtimeOnly 'org.springframework.boot:spring-boot-properties-migrator'

    testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'

    testCompileOnly 'org.projectlombok:lombok:1.18.46'
    // Testcontainers 2.x renamed every module with a `testcontainers-` prefix.
    // Versions pinned because the protobuf-gradle-plugin's *ProtoPath configs do
    // not inherit BOM-managed versions from the dependency-management plugin.
    testImplementation 'org.testcontainers:testcontainers:2.0.5'
    testImplementation 'com.h2database:h2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // Boot 4 split webmvc test slices (AutoConfigureMockMvc, MockMvc helpers) into
    // a dedicated module that spring-boot-starter-test no longer pulls in by default.
    testImplementation 'org.springframework.boot:spring-boot-webmvc-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.5'
    testImplementation 'org.testcontainers:testcontainers-postgresql:2.0.5'
    testImplementation 'org.wiremock:wiremock-standalone:3.13.2'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:4.34.1'
    }
}

// The protobuf-gradle-plugin resolves protoc through a separate configuration that
// holds platform-specific native binaries (e.g. protoc-*-linux-x86_64.exe), not jars.
// CycloneDX scans every resolvable configuration by default and tries to read each
// artifact's POM as a zip — which throws ZipException on the native binary. Skip it.
cyclonedxBom {
    skipConfigs = ['protobufToolsLocator_protoc']
}

tasks.named('test') {
    useJUnitPlatform {
        excludeTags 'e2e'
    }
    testLogging {
        exceptionFormat = 'full'
        showStackTraces = true
    }
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
    // 2GB heap so multiple cached Spring contexts (each holding ~45MB of HuggingFace ONNX
    // embedding weights) don't OOM the test JVM. Default gradle test heap is 512MB.
    maxHeapSize = '2g'
    // Disable OTLP exporters in tests — there is no collector listening, so each
    // scheduled push spams the log with ConnectException stack traces.
    systemProperty 'management.otlp.metrics.export.enabled', 'false'
    systemProperty 'management.otlp.tracing.export.enabled', 'false'
    systemProperty 'management.otlp.logging.export.enabled', 'false'
    finalizedBy jacocoTestReport
}

tasks.register('generateOpenApiDocs', Test) {
    description = 'Regenerates backend/openapi.json from the live OpenAPI endpoint.'
    group = 'documentation'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        // intentionally only run the spec generator
    }
    filter {
        includeTestsMatching 'dev.tylercash.event.openapi.OpenApiSpecGenerationTest'
    }
}

tasks.register('e2eTest', Test) {
    description = 'Runs e2e tests against real external services (Discord, DB). Requires credentials in environment.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'e2e'
    }
    shouldRunAfter test
}

jacoco {
    toolVersion = '0.8.14'
}

jacocoTestReport {
    dependsOn test
    mustRunAfter e2eTest
    // Pick up exec files from both test and e2eTest when both have run
    executionData fileTree(layout.buildDirectory.dir("jacoco")).include("*.exec")
    // Exclude generated GTFS-R protobuf — ~13k lines we don't author, dominates the headline number.
    classDirectories.setFrom(files(classDirectories.files.collect {
        fileTree(it) {
            exclude 'com/google/transit/realtime/**'
        }
    }))
    reports {
        xml.required = true
        html.required = true
    }
}

spotless {
    java {
        target 'src/**/*.java'
        palantirJavaFormat('2.50.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

def modelDir = file("src/main/resources/models")
def tokenizerFile = file("src/main/resources/models/tokenizer.json")
def modelFile = file("src/main/resources/models/model.onnx")
def tokenizerUrl = "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json"
def modelUrl = "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx"

tasks.register("downloadModel") {
    description = "Downloads all-MiniLM-L6-v2 ONNX model files into src/main/resources/models/ for classpath bundling."
    group = "build"
    outputs.files(tokenizerFile, modelFile)
    onlyIf { !modelFile.exists() || !tokenizerFile.exists() }
    doLast {
        modelDir.mkdirs()
        if (!tokenizerFile.exists()) {
            logger.lifecycle("Downloading tokenizer.json (~0.5MB)...")
            new URL(tokenizerUrl).withInputStream { ins -> tokenizerFile.bytes = ins.bytes }
        }
        if (!modelFile.exists()) {
            logger.lifecycle("Downloading model.onnx (~23MB)...")
            new URL(modelUrl).withInputStream { ins -> modelFile.bytes = ins.bytes }
        }
        logger.lifecycle("Model files ready in ${modelDir}")
    }
}

processResources.dependsOn("downloadModel")

// Spring Boot 4 removed BootJar.launchScript() / fully-executable jars.
// Deployment uses the buildpack image below, so no launch script is needed.

tasks.bootBuildImage {
    imageName = "ghcr.io/tyler-cash/peep-bot-backend:latest"
    builder = "paketobuildpacks/builder-jammy-full:latest"
    environment.putAll([
            "BP_OCI_SOURCE"          : "https://github.com/Tyler-Cash/peep-bot",
            "BP_OCI_URL"             : "https://github.com/Tyler-Cash/peep-bot",
            "BP_OCI_DESCRIPTION"     : "Peep Bot backend — Spring Boot Discord event management API",
            "BPE_JAVA_TOOL_OPTIONS"  : "-Djava.awt.headless=true",
    ])
}
