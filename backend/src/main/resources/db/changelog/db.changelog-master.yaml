databaseChangeLog:
  - changeSet:
      id: initialize db
      author: tyler
      changes:
        - createTable:
            tableName: event
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: channel_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: server_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: location
                  type: text
              - column:
                  name: capacity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: cost
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: accepted
                  type: text
              - column:
                  name: declined
                  type: text
              - column:
                  name: maybe
                  type: text
              - column:
                  name: date_time
                  type: text
                  constraints:
                    nullable: false
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: snowflake
                  type: text
                  constraints:
                    nullable: false
        - createTable:
            tableName: account_session
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: session_key
                  type: text
                  constraints:
                    nullable: false
  - changeSet:
      id: add_timestamp_migration_column
      author: tyler
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: timestamp_migration
                  type: TIMESTAMP WITH TIME ZONE
        - dropNotNullConstraint:
            tableName: event
            columnName: date_time
            columnDataType: text
  - changeSet:
      id: Delete old timestamp column
      author: tyler
      changes:
        - dropColumn:
            tableName: event
            columns:
              - column:
                  name: date_time
        - renameColumn:
            tableName: event
            oldColumnName: timestamp_migration
            newColumnName: date_time
        - addNotNullConstraint:
            tableName: event
            columnName: date_time
            columnDataType: text
  - changeSet:
      id: spring-session-create
      author: tyler
      changes:
        - sqlFile:
            splitStatements: true
            path: classpath:org/springframework/session/jdbc/schema-postgresql.sql
  - changeSet:
      id: create id index
      author: tyler
      changes:
        - createIndex:
            clustered: true
            columns:
              - column:
                  name: id
            indexName: id_index
            tableName: event
            unique: true
        - createIndex:
            clustered: true
            columns:
              - column:
                  name: message_id
            indexName: message_id_index
            tableName: event
            unique: true
  - changeSet:
      id: add notification column
      author: tyler
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: notifications
                  type: text
                  defaultValue: "[]"
                  constraints:
                    nullable: false
  - changeSet:
      id: add creator column
      author: tyler
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: creator
                  type: text
                  defaultValue: "Tyler"
                  constraints:
                    nullable: false
  - changeSet:
      id: create shedlock table
      author: jules
      changes:
        - createTable:
            tableName: shedlock
            columns:
              - column:
                  name: name
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: lock_until
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: locked_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: locked_by
                  type: varchar(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: add maybe confirmation message id column
      author: jules
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: maybe_confirmation_message_id
                  type: bigint
  - changeSet:
      id: make maybe_confirmation_message_id nullable
      author: jules
      changes:
        - dropNotNullConstraint:
            tableName: event
            columnName: maybe_confirmation_message_id
            columnDataType: bigint
  - changeSet:
      id: remove maybe confirmation notification
      author: tyler
      changes:
        - sql:
            sql: >
              UPDATE event
              SET notifications = (
                SELECT COALESCE(json_agg(elem)::text, '[]')
                FROM event e,
                LATERAL json_array_elements(e.notifications::json) AS elem
                WHERE e.id = event.id
                AND elem->>'type' != 'MAYBE_CONFIRMATION'
              )
              WHERE notifications::text LIKE '%MAYBE_CONFIRMATION%'
        - dropColumn:
            tableName: event
            columns:
              - column:
                  name: maybe_confirmation_message_id
      rollback:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: maybe_confirmation_message_id
                  type: bigint
  - changeSet:
      id: add immich album columns
      author: tyler
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: immich_album_id
                  type: text
              - column:
                  name: immich_share_key
                  type: text
  - changeSet:
      id: migrate event state to state machine
      author: claude
      comment: >
        Map existing events to new granular states based on their notifications JSON.
        Order matters: most-advanced state first to avoid double-matching.
        Events already ARCHIVED or DELETED stay unchanged. PLANNED events with no
        notifications stay PLANNED.
      changes:
        - sql:
            sql: >
              UPDATE event SET state = 'COMPLETED'
              WHERE state = 'PLANNED' AND notifications::text LIKE '%ATTENDANCE_LOCKED%';
        - sql:
            sql: >
              UPDATE event SET state = 'ALBUM_POSTED'
              WHERE state = 'PLANNED' AND notifications::text LIKE '%ALBUM_LINK%';
        - sql:
            sql: >
              UPDATE event SET state = 'NOTIFIED'
              WHERE state = 'PLANNED' AND notifications::text LIKE '%START_OF_EVENT%';
        - createIndex:
            columns:
              - column:
                  name: state
            indexName: idx_event_state
            tableName: event
  - changeSet:
      id: add channel_id index
      author: claude
      changes:
        - createIndex:
            columns:
              - column:
                  name: channel_id
            indexName: idx_event_channel_id
            tableName: event
            unique: true
  - changeSet:
      id: create discord_user_cache table
      author: claude
      changes:
        - createTable:
            tableName: discord_user_cache
            columns:
              - column:
                  name: snowflake
                  type: text
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: display_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: create attendance table
      author: claude
      changes:
        - createTable:
            tableName: attendance
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attendance_event
                    references: event(id)
              - column:
                  name: snowflake
                  type: text
              - column:
                  name: name
                  type: text
              - column:
                  name: status
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: owner_snowflake
                  type: text
              - column:
                  name: recorded_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            columns:
              - column:
                  name: event_id
              - column:
                  name: snowflake
            indexName: idx_attendance_event_snowflake
            tableName: attendance
        - createIndex:
            columns:
              - column:
                  name: event_id
              - column:
                  name: name
            indexName: idx_attendance_event_name
            tableName: attendance
  - changeSet:
      id: migrate event creator to snowflake
      author: claude
      comment: >
        Best-effort migration of event.creator from username to snowflake.
        Matches creator name against accepted attendee names. Events where
        no match is found retain their original creator value.
      changes:
        - sql:
            sql: >
              UPDATE event e
              SET creator = sub.snowflake
              FROM (
                SELECT DISTINCT ON (ev.id) ev.id AS event_id, elem->>'snowflake' AS snowflake
                FROM event ev,
                LATERAL json_array_elements(
                  CASE WHEN ev.accepted IS NOT NULL AND ev.accepted != '' THEN ev.accepted::json ELSE '[]'::json END
                ) AS elem
                WHERE elem->>'snowflake' IS NOT NULL
                AND elem->>'snowflake' != ''
                AND elem->>'name' = ev.creator
                ORDER BY ev.id
              ) sub
              WHERE e.id = sub.event_id
  - changeSet:
      id: seed discord_user_cache from existing data
      author: claude
      comment: >
        Extract unique (snowflake, name) pairs from existing JSON attendee
        columns and populate the discord_user_cache table.
      changes:
        - sql:
            sql: >
              INSERT INTO discord_user_cache (snowflake, display_name, updated_at)
              SELECT DISTINCT ON (elem->>'snowflake')
                elem->>'snowflake',
                elem->>'name',
                NOW()
              FROM event e,
              LATERAL (
                SELECT json_array_elements(
                  CASE WHEN e.accepted IS NOT NULL AND e.accepted != '' THEN e.accepted::json ELSE '[]'::json END
                ) AS elem
                UNION ALL
                SELECT json_array_elements(
                  CASE WHEN e.declined IS NOT NULL AND e.declined != '' THEN e.declined::json ELSE '[]'::json END
                )
                UNION ALL
                SELECT json_array_elements(
                  CASE WHEN e.maybe IS NOT NULL AND e.maybe != '' THEN e.maybe::json ELSE '[]'::json END
                )
              ) sub
              WHERE elem->>'snowflake' IS NOT NULL
              AND elem->>'snowflake' != ''
              ORDER BY elem->>'snowflake', elem->>'name'
              ON CONFLICT (snowflake) DO NOTHING
  - changeSet:
      id: migrate attendee json to attendance table
      author: claude
      comment: >
        Migrate existing JSON attendee data from event columns into the
        attendance table. Discord users get snowflake set; +1 guests get
        name set with owner_snowflake pointing to the event creator.
      changes:
        - sql:
            sql: >
              INSERT INTO attendance (event_id, snowflake, name, status, owner_snowflake, recorded_at)
              SELECT
                e.id,
                CASE WHEN elem->>'snowflake' IS NOT NULL AND elem->>'snowflake' != '' THEN elem->>'snowflake' ELSE NULL END,
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN elem->>'name' ELSE NULL END,
                'ACCEPTED',
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN e.creator ELSE NULL END,
                COALESCE((elem->>'instant')::timestamptz, NOW())
              FROM event e,
              LATERAL json_array_elements(
                CASE WHEN e.accepted IS NOT NULL AND e.accepted != '' THEN e.accepted::json ELSE '[]'::json END
              ) AS elem
        - sql:
            sql: >
              INSERT INTO attendance (event_id, snowflake, name, status, owner_snowflake, recorded_at)
              SELECT
                e.id,
                CASE WHEN elem->>'snowflake' IS NOT NULL AND elem->>'snowflake' != '' THEN elem->>'snowflake' ELSE NULL END,
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN elem->>'name' ELSE NULL END,
                'DECLINED',
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN e.creator ELSE NULL END,
                COALESCE((elem->>'instant')::timestamptz, NOW())
              FROM event e,
              LATERAL json_array_elements(
                CASE WHEN e.declined IS NOT NULL AND e.declined != '' THEN e.declined::json ELSE '[]'::json END
              ) AS elem
        - sql:
            sql: >
              INSERT INTO attendance (event_id, snowflake, name, status, owner_snowflake, recorded_at)
              SELECT
                e.id,
                CASE WHEN elem->>'snowflake' IS NOT NULL AND elem->>'snowflake' != '' THEN elem->>'snowflake' ELSE NULL END,
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN elem->>'name' ELSE NULL END,
                'MAYBE',
                CASE WHEN elem->>'snowflake' IS NULL OR elem->>'snowflake' = '' THEN e.creator ELSE NULL END,
                COALESCE((elem->>'instant')::timestamptz, NOW())
              FROM event e,
              LATERAL json_array_elements(
                CASE WHEN e.maybe IS NOT NULL AND e.maybe != '' THEN e.maybe::json ELSE '[]'::json END
              ) AS elem
  - changeSet:
      id: drop old attendee json columns
      author: claude
      changes:
        - dropColumn:
            tableName: event
            columns:
              - column:
                  name: accepted
              - column:
                  name: declined
              - column:
                  name: maybe
  - changeSet:
      id: purge all spring sessions
      author: claude
      comment: >
        One-off purge of all sessions to clear bloat from old 365-day expiry.
        New sessions will be created with 90-day expiry.
      changes:
        - sql:
            sql: TRUNCATE spring_session_attributes, spring_session
  - changeSet:
      id: migrate notified events with album data to album_ready
      author: claude
      comment: >
        Events in NOTIFIED state that already have Immich album and shared link
        should be in the new ALBUM_READY state so the poller sends POST_ALBUM.
      changes:
        - sql:
            sql: >
              UPDATE event SET state = 'ALBUM_READY'
              WHERE state = 'NOTIFIED'
              AND immich_album_id IS NOT NULL
              AND immich_share_key IS NOT NULL
  - changeSet:
      id: add event role columns
      author: claude
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: accepted_role_id
                  type: bigint
              - column:
                  name: declined_role_id
                  type: bigint
              - column:
                  name: maybe_role_id
                  type: bigint
  - changeSet:
      id: add private channel column
      author: tyler
      changes:
        - addColumn:
            tableName: event
            columns:
              - column:
                  name: private_channel_id
                  type: bigint
        - createIndex:
            columns:
              - column:
                  name: private_channel_id
            indexName: idx_event_private_channel_id
            tableName: event
            unique: true
  - changeSet:
      id: rename event states
      author: claude
      comment: Rename states to follow phase-based naming convention.
      changes:
        - sql:
            sql: >
              UPDATE event SET state = 'PRE_NOTIFIED' WHERE state = 'NOTIFIED';
              UPDATE event SET state = 'POST_ALBUM_READY' WHERE state = 'ALBUM_READY';
              UPDATE event SET state = 'POST_ALBUM_SHARED' WHERE state = 'ALBUM_POSTED';
              UPDATE event SET state = 'POST_COMPLETED' WHERE state = 'COMPLETED';
  - changeSet:
      id: add vector extension
      author: claude
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM pg_extension WHERE extname = 'vector'
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS vector;
  - changeSet:
      id: create event_embedding table
      author: claude
      changes:
        - sql:
            splitStatements: true
            sql: >
              CREATE TABLE event_embedding (
                event_id UUID PRIMARY KEY REFERENCES event(id),
                name_text TEXT NOT NULL,
                embedding vector(384) NOT NULL,
                computed_at TIMESTAMP WITH TIME ZONE NOT NULL
              );
              CREATE INDEX idx_event_embedding_cosine ON event_embedding
              USING ivfflat (embedding vector_cosine_ops) WITH (lists = 10);
  - changeSet:
      id: create event_category table
      author: claude
      changes:
        - createTable:
            tableName: event_category
            columns:
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_event_category_event
                    references: event(id)
              - column:
                  name: category_label
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: category_centroid_event_id
                  type: UUID
              - column:
                  name: assigned_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_event_category_label
            tableName: event_category
            columns:
              - column:
                  name: category_label
  - changeSet:
      id: add rewind performance indexes
      author: claude
      changes:
        - createIndex:
            indexName: idx_attendance_snowflake_status
            tableName: attendance
            columns:
              - column:
                  name: snowflake
              - column:
                  name: status
        - createIndex:
            indexName: idx_event_date_time
            tableName: event
            columns:
              - column:
                  name: date_time
  - changeSet:
      id: add avatar columns to discord_user_cache
      author: tyler
      changes:
        - addColumn:
            tableName: discord_user_cache
            columns:
              - column:
                  name: avatar_bytes
                  type: bytea
              - column:
                  name: avatar_content_type
                  type: text
  - changeSet:
      id: add discord_user_guild table
      author: antigravity
      changes:
        - createTable:
            tableName: discord_user_guild
            columns:
              - column:
                  name: snowflake
                  type: text
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_guild_snowflake
                    references: discord_user_cache(snowflake)
              - column:
                  name: guild_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            columnNames: snowflake, guild_id
            tableName: discord_user_guild
        - createIndex:
            indexName: idx_user_guild_snowflake
            tableName: discord_user_guild
            columns:
              - column:
                  name: snowflake
        - createIndex:
            indexName: idx_user_guild_guild_id
            tableName: discord_user_guild
            columns:
              - column:
                  name: guild_id

  - include:
      file: db/changelog/contract/db.changelog-contract.yaml

