management:
  opentelemetry:
    resource-attributes:
      deployment.environment.name: production
      service.namespace: peep-bot

dev.tylercash:
  cors:
    allowed-origins:
      - https://event.tylercash.dev
  frontend:
    hostname: event.tylercash.dev
  immich:
    enabled: true
    album-name-prefix: ""
  rewind:
    normalisation-enabled: true
  oauth2:
    # Pinned so X-Forwarded-Host can't influence the redirect_uri Spring Security generates.
    # Must exactly match a redirect registered in the Discord Developer Portal.
    redirect-uri: https://api.event.tylercash.dev/api/login/oauth2/code/discord
