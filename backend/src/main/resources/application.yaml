spring.application.name: peepbot-backend

peepbot:
  classifier:
    backfill:
      # Set to the deploy timestamp (ISO-8601 with offset, e.g. 2026-05-23T14:00:00+10:00)
      # to trigger a one-shot reclassification of every event whose category was assigned
      # before that time. Leave blank in production after the backfill completes.
      run-before:
      pacing: PT1S
spring.autoconfigure.exclude:
  - org.springframework.boot.actuate.autoconfigure.logging.OpenTelemetryLoggingAutoConfiguration
  - org.springframework.boot.actuate.autoconfigure.logging.otlp.OtlpLoggingAutoConfiguration

dev.tylercash:
  discord:
    timeout: 60
  feature-toggles:
    remove-plus-ones-on-decline: true
  immich:
    enabled: false
    album-name-prefix: "[DEV] "
  frontend:
    protocol: https
    hostname: api.event.tylercash.dev
    path: /
  rate-limit:
    read-capacity: 300
    read-refill-seconds: 30
    write-capacity: 20
    write-refill-seconds: 60
  rewind:
    enabled: true
    cluster-similarity-threshold: 0.72
    backfill-batch-size: 20
    normalisation-enabled: false
    classifier-temperature: 0.0  # picked from classifier eval (all 4 temps tied at 100%; 0.0 is most deterministic)
  tfnsw:
    api-key: "${TFNSW_API_KEY:}"
    alerts-base-url: "https://api.transport.nsw.gov.au"
    live-traffic-base-url: "https://api.transport.nsw.gov.au"
    nearest-station-radius-km: 1.5
    major-event-radius-km: 5.0
    closure-radius-km: 2.0
  cors:
    allowed-origins: https://event.tylercash.dev,https://event-staging.tylercash.dev

springdoc:
  show-oauth2-endpoints: true

server:
  forward-headers-strategy: NATIVE
  tomcat:
    use-relative-redirects: false
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      # Trust forwarded headers only from the docker bridge ranges where Traefik runs
      # (172.16.0.0/12) plus loopback. Tomcat's default permits all RFC1918, which lets
      # any caller on the homelab VPN spoof X-Forwarded-Host/Proto. Tighten further to
      # the specific compose network's subnet (e.g. 172\\.28\\.0\\.\\d+) once it is
      # pinned in docker-compose. See pentest finding F-001.
      internal-proxies: "127\\.0\\.0\\.1|::1|172\\.(1[6-9]|2[0-9]|3[01])\\.\\d+\\.\\d+"
  servlet:
    session:
      cookie:
        secure: true
        name: SESSION
        http-only: true
        same-site: Lax
        domain: event.tylercash.dev
    context-path: /api

spring:
  main:
    lazy-initialization: true
  cache:
    type: caffeine
    cache-names: activeEvents,eventDetail,openContracts,rewind,guild,guildMembership
    caffeine:
      spec: maximumSize=500,expireAfterWrite=120s
  ai:
    ollama:
      base-url: https://ollama.tylercash.dev
      chat:
        enabled: false
        # mistral-nemo:12b chosen via the classifier eval harness — qwen2.5:0.5b can't follow
        # the v2 prompt's structured definitions / tie-breakers / few-shot examples. See
        # backend/src/test/java/dev/tylercash/event/rewind/eval/ClassifierEvalTest.java.
        model: mistral-nemo:12b-instruct-2407-q8_0
        options:
          temperature: 0.0
          num-predict: 15
      embedding:
        enabled: false  # use spring-ai-starter-model-transformers instead
    embedding:
      transformer:
        enabled: true  # downloads ~45MB all-MiniLM-L6-v2 model from HuggingFace on first startup, cached locally after
        tokenizer:
          uri: classpath:/models/tokenizer.json
        model:
          uri: classpath:/models/model.onnx
  session:
    jdbc:
      initialize-schema: never
      cleanup-cron: 0 */10 * * * *
  datasource:
    driverClassName: org.postgresql.Driver
    hikari:
      # Sized to cover concurrent demand without queueing under realistic load:
      #   - eventBusExecutor.maxPoolSize = 16 (each listener's @Transactional
      #     can hold a connection for the duration of its work)
      #   - schedulers + retry pollers: ~3 simultaneous
      #   - web requests: realistic peak for a Discord bot ≪ Tomcat's 200
      # 25 gives the eventbus full headroom plus ~9 for everything else, which
      # is well within Postgres's per-connection overhead (~10MB).
      maximum-pool-size: 25
      minimum-idle: 5
      # Default is 30s, which exactly matches the saga integration test's
      # poll-deadline and turns pool exhaustion into a silent test timeout
      # rather than a clear SQLException. Tighten to 10s so exhaustion fails
      # fast and the dispatcher's markFailed path runs while tests still observe it.
      connection-timeout: 10000
  security:
    oauth2:
      client:
        registration:
          discord:
            client-authentication-method: client_secret_post
            authorizationGrantType: authorization_code
            scope:
              - identify
            # Spring Security's {baseUrl} is derived from the request and influenced by
            # X-Forwarded-Host. Set DEV_TYLERCASH_OAUTH2_REDIRECT_URI in prod to a literal
            # URL (e.g. https://api.event.tylercash.dev/api/login/oauth2/code/discord) so
            # the redirect_uri the browser sees cannot be spoofed by a forged forwarded
            # host header. See pentest finding F-001 #2.
            redirectUri: ${dev.tylercash.oauth2.redirect-uri:{baseUrl}/login/oauth2/code/discord}
            clientName: Peep Bot
        provider:
          discord:
            authorizationUri: https://discordapp.com/api/oauth2/authorize
            tokenUri: https://discordapp.com/api/oauth2/token
            userInfoUri: https://discordapp.com/api/users/@me
            usernameAttribute: username

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: [ health, prometheus ]
  metrics:
    distribution:
      # Publish Prometheus-compatible histogram buckets for every Timer.
      # Without this Micrometer emits only `_count`, `_sum`, and an `le="+Inf"`
      # bucket, so `histogram_quantile()` returns NaN. Dashboards use p95/p99
      # on scheduled tasks and lifecycle listener latency — they need buckets.
      percentiles-histogram:
        all: true
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: true
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name}


otel:
  instrumentation:
    # Spring's RestClient already emits an `http get` CLIENT span via Micrometer Observation
    # (bridged to OTel by micrometer-tracing-bridge-otel). Letting OTel's java-http-client
    # instrumentation also wrap the underlying JDK HttpClient produces a duplicate child
    # `GET` span per outbound call. Same dedup pattern as the actuator logging exclusion above.
    java-http-client:
      enabled: false
    http-url-connection:
      enabled: false

# datasource-micrometer creates spans for CONNECTION, QUERY, FETCH, KEYS. The FETCH
# (result-set) spans add a child per query that's almost always zero-info — drop them
# to keep the trace waterfall readable and reduce Tempo storage.
jdbc:
  includes: CONNECTION,QUERY

resilience4j:
  circuitbreaker:
    instances:
      tfnsw:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      # Discord brownouts (5xx, gateway slowness) used to pile up on the
      # discordListenerExecutor while JDA retried indefinitely. Fail fast instead so
      # listeners mark themselves FAILED and the durable retry poller drains the work
      # once the half-open probe shows Discord is back. ErrorResponseException is
      # ignored because it covers client-side 4xx (unknown channel, missing perms, etc.)
      # — those mean "your request was bad," not "Discord is broken."
      discord:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - net.dv8tion.jda.api.exceptions.ErrorResponseException
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - java.util.concurrent.CompletionException
          - net.dv8tion.jda.api.exceptions.RateLimitedException
