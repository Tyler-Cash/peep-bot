spring.application.name: peep-bot
spring.main.lazy-initialization: true

dev.tylercash:
  discord:
    timeout: 60
    seperator-channel: organising
    admin-role: event-admin
  feature-toggles:
    remove-plus-ones-on-decline: true
  immich:
    enabled: false
    album-name-prefix: "[DEV] "
  frontend:
    protocol: https
    path: /

springdoc:
  show-oauth2-endpoints: true

server:
  forward-headers-strategy: NATIVE
  tomcat:
    use-relative-redirects: false
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
  servlet:
    session:
      cookie:
        secure: true
    context-path: /api/

spring:
  data:
    web:
      pageable:
        max-page-size: 100
  session:
    cookie:
      name: SESSION
      http-only: true
      secure: true
      same-site: Lax
    jdbc:
      initialize-schema: never
      cleanup-cron: 0 */10 * * * *
  datasource:
    driverClassName: org.postgresql.Driver
  security:
    oauth2:
      client:
        registration:
          discord:
            client-authentication-method: client_secret_post
            authorizationGrantType: authorization_code
            scope:
              - identify
            redirectUri: "{baseUrl}/login/oauth2/code/discord"
            clientName: Peep Bot
        provider:
          discord:
            authorizationUri: https://discordapp.com/api/oauth2/authorize
            tokenUri: https://discordapp.com/api/oauth2/token
            userInfoUri: https://discordapp.com/api/users/@me
            usernameAttribute: username

management:
  endpoints:
    web:
      exposure:
        include: [ health, prometheus ]
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    metrics:
      export:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name}
    logging:
      export:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
  tracing:
    sampling:
      probability: 1.0

