spring.application.name: peepbot-backend
spring.autoconfigure.exclude:
  - org.springframework.boot.actuate.autoconfigure.logging.OpenTelemetryLoggingAutoConfiguration
  - org.springframework.boot.actuate.autoconfigure.logging.otlp.OtlpLoggingAutoConfiguration

dev.tylercash:
  discord:
    timeout: 60
  feature-toggles:
    remove-plus-ones-on-decline: true
  immich:
    enabled: false
    album-name-prefix: "[DEV] "
  frontend:
    protocol: https
    hostname: api.event.tylercash.dev
    path: /
  rate-limit:
    read-capacity: 300
    read-refill-seconds: 30
    write-capacity: 20
    write-refill-seconds: 60
  rewind:
    enabled: true
    cluster-similarity-threshold: 0.72
    backfill-batch-size: 20
    normalisation-enabled: false
  tfnsw:
    api-key: "${TFNSW_API_KEY:}"
    alerts-base-url: "https://api.transport.nsw.gov.au"
    live-traffic-base-url: "https://api.transport.nsw.gov.au"
    nearest-station-radius-km: 1.5
    major-event-radius-km: 5.0
    closure-radius-km: 2.0
  cors:
    allowed-origins: https://event.tylercash.dev,https://event-staging.tylercash.dev

springdoc:
  show-oauth2-endpoints: true

server:
  forward-headers-strategy: NATIVE
  tomcat:
    use-relative-redirects: false
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      # Trust forwarded headers only from the docker bridge ranges where Traefik runs
      # (172.16.0.0/12) plus loopback. Tomcat's default permits all RFC1918, which lets
      # any caller on the homelab VPN spoof X-Forwarded-Host/Proto. Tighten further to
      # the specific compose network's subnet (e.g. 172\\.28\\.0\\.\\d+) once it is
      # pinned in docker-compose. See pentest finding F-001.
      internal-proxies: "127\\.0\\.0\\.1|::1|172\\.(1[6-9]|2[0-9]|3[01])\\.\\d+\\.\\d+"
  servlet:
    session:
      cookie:
        secure: true
        name: SESSION
        http-only: true
        same-site: Lax
        domain: event.tylercash.dev
    context-path: /api

spring:
  main:
    lazy-initialization: true
  cache:
    type: caffeine
    cache-names: activeEvents,eventDetail,openContracts,rewind
    caffeine:
      spec: maximumSize=500,expireAfterWrite=120s
  ai:
    ollama:
      base-url: https://ollama.tylercash.dev
      chat:
        enabled: false
        model: qwen2.5:0.5b
        options:
          temperature: 0.0
          num-predict: 15
      embedding:
        enabled: false  # use spring-ai-starter-model-transformers instead
    embedding:
      transformer:
        enabled: true  # downloads ~45MB all-MiniLM-L6-v2 model from HuggingFace on first startup, cached locally after
        tokenizer:
          uri: classpath:/models/tokenizer.json
        model:
          uri: classpath:/models/model.onnx
  session:
    jdbc:
      initialize-schema: never
      cleanup-cron: 0 */10 * * * *
  datasource:
    driverClassName: org.postgresql.Driver
  security:
    oauth2:
      client:
        registration:
          discord:
            client-authentication-method: client_secret_post
            authorizationGrantType: authorization_code
            scope:
              - identify
            # Spring Security's {baseUrl} is derived from the request and influenced by
            # X-Forwarded-Host. Set DEV_TYLERCASH_OAUTH2_REDIRECT_URI in prod to a literal
            # URL (e.g. https://api.event.tylercash.dev/api/login/oauth2/code/discord) so
            # the redirect_uri the browser sees cannot be spoofed by a forged forwarded
            # host header. See pentest finding F-001 #2.
            redirectUri: ${dev.tylercash.oauth2.redirect-uri:{baseUrl}/login/oauth2/code/discord}
            clientName: Peep Bot
        provider:
          discord:
            authorizationUri: https://discordapp.com/api/oauth2/authorize
            tokenUri: https://discordapp.com/api/oauth2/token
            userInfoUri: https://discordapp.com/api/users/@me
            usernameAttribute: username

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: [ health, prometheus ]
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: true
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name}


otel:
  instrumentation:
    # Spring's RestClient already emits an `http get` CLIENT span via Micrometer Observation
    # (bridged to OTel by micrometer-tracing-bridge-otel). Letting OTel's java-http-client
    # instrumentation also wrap the underlying JDK HttpClient produces a duplicate child
    # `GET` span per outbound call. Same dedup pattern as the actuator logging exclusion above.
    java-http-client:
      enabled: false
    http-url-connection:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      tfnsw:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
        minimum-number-of-calls: 5
