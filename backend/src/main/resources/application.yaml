spring.application.name: peep-bot

dev.tylercash:
  discord:
    timeout: 60
    seperator-channel: organising
    admin-role: event-admin
  feature-toggles:
    remove-plus-ones-on-decline: true
  immich:
    enabled: false
    album-name-prefix: "[DEV] "
  frontend:
    protocol: https
    path: /
  rate-limit:
    read-capacity: 60
    read-refill-seconds: 60
    write-capacity: 5
    write-refill-seconds: 60
  rewind:
    enabled: true
    cluster-similarity-threshold: 0.72
    backfill-batch-size: 20
    normalisation-enabled: false
  cors:
    allowed-origins: https://event.tylercash.dev,https://event-staging.tylercash.dev

springdoc:
  show-oauth2-endpoints: true

server:
  forward-headers-strategy: NATIVE
  tomcat:
    use-relative-redirects: false
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
  servlet:
    session:
      cookie:
        secure: true
    context-path: /api

spring:
  main:
    lazy-initialization: true
  cache:
    type: caffeine
    cache-names: activeEvents,eventDetail,openContracts,rewind
    caffeine:
      spec: maximumSize=500,expireAfterWrite=120s
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
        model: qwen2.5:0.5b
        options:
          temperature: 0.0
          num-predict: 15
      embedding:
        enabled: false  # use spring-ai-starter-model-transformers instead
    embedding:
      transformer:
        enabled: true  # downloads ~45MB all-MiniLM-L6-v2 model from HuggingFace on first startup, cached locally after
        tokenizer:
          uri: classpath:/models/tokenizer.json
        model:
          uri: classpath:/models/model.onnx
  session:
    cookie:
      name: SESSION
      http-only: true
      secure: true
      same-site: Lax
    jdbc:
      initialize-schema: never
      cleanup-cron: 0 */10 * * * *
  datasource:
    driverClassName: org.postgresql.Driver
  security:
    oauth2:
      client:
        registration:
          discord:
            client-authentication-method: client_secret_post
            authorizationGrantType: authorization_code
            scope:
              - identify
            redirectUri: "{baseUrl}/login/oauth2/code/discord"
            clientName: Peep Bot
        provider:
          discord:
            authorizationUri: https://discordapp.com/api/oauth2/authorize
            tokenUri: https://discordapp.com/api/oauth2/token
            userInfoUri: https://discordapp.com/api/users/@me
            usernameAttribute: username

management:
  endpoints:
    web:
      exposure:
        include: [ health, prometheus ]
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:https://otel.tylercash.dev}/v1/traces
    metrics:
      export:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:https://otel.tylercash.dev}/v1/metrics
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name}
    logging:
      export:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:https://otel.tylercash.dev}/v1/logs
  tracing:
    sampling:
      probability: 1.0 # 100% sampling — appropriate for low-traffic hobby project

